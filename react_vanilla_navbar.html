<!-- Perfected Shadcn Navbar -->
<style>
  :root {
    --bg-background: 0, 0, 0;
    --border-border: #334155;
    --bg-primary: #ffffff;
    --text-primary-foreground: #0f172a;
    --bg-accent: rgba(255, 255, 255, 0.1);
    --text-accent-foreground: #ffffff;
    --text-foreground: #ffffff;
  }

  body.menu-open {
    overflow: hidden;
  }

  .shadcn-header {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    margin: 0 auto;
    width: 100%;
    max-width: 64rem; /* max-w-5xl */
    border-bottom: 1px solid transparent;
    transition: all 0.3s ease-out;
    background-color: transparent;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text-foreground);
  }

  @media (min-width: 768px) {
    .shadcn-header {
      border-radius: 0.375rem;
      border: 1px solid transparent;
    }
  }

  .shadcn-header.scrolled:not(.menu-open) {
    background-color: rgba(var(--bg-background), 0.5);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-color: var(--border-border);
  }

  @media (min-width: 768px) {
    .shadcn-header.scrolled:not(.menu-open) {
      top: 1rem; /* md:top-4 */
      max-width: 56rem; /* md:max-w-4xl */
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
    }
  }

  .shadcn-header.menu-open {
    background-color: rgba(var(--bg-background), 0.9);
  }

  .shadcn-nav {
    display: flex;
    height: 3.5rem; /* h-14 */
    width: 100%;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem; /* px-4 */
    transition: all 0.3s ease-out;
  }

  @media (min-width: 768px) {
    .shadcn-nav {
      height: 3rem; /* md:h-12 */
    }
    .shadcn-header.scrolled .shadcn-nav {
      padding: 0 0.5rem; /* md:px-2 */
    }
  }

  .shadcn-wordmark {
    height: 1rem; /* h-4 */
    width: auto;
    color: currentColor;
  }

  .shadcn-desktop-menu {
    display: none;
    align-items: center;
    gap: 0.5rem;
  }

  @media (min-width: 768px) {
    .shadcn-desktop-menu {
      display: flex;
    }
  }

  .shadcn-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    font-weight: 500;
    transition: all 0.2s ease-out;
    cursor: pointer;
    text-decoration: none;
  }

  .shadcn-btn-default-size { height: 2.5rem; padding: 0 1rem; }
  .shadcn-btn-icon-size { height: 2.5rem; width: 2.5rem; }

  .shadcn-btn-ghost {
    background-color: transparent;
    color: var(--text-foreground);
    border: none;
  }
  .shadcn-btn-ghost:hover {
    background-color: var(--bg-accent);
    color: var(--text-accent-foreground);
  }

  .shadcn-btn-outline {
    background-color: rgb(var(--bg-background));
    border: 1px solid var(--border-border);
    color: var(--text-foreground);
  }
  .shadcn-btn-outline:hover {
    background-color: var(--bg-accent);
    color: var(--text-accent-foreground);
  }

  .shadcn-btn-primary {
    background-color: var(--bg-primary);
    color: var(--text-primary-foreground);
    border: none;
  }
  .shadcn-btn-primary:hover {
    background-color: rgba(15, 23, 42, 0.9);
  }

  .shadcn-mobile-toggle {
    display: flex;
  }

  @media (min-width: 768px) {
    .shadcn-mobile-toggle {
      display: none;
    }
  }

  .shadcn-mobile-menu {
    display: none;
    position: fixed;
    top: 3.5rem;
    right: 0;
    bottom: 0;
    left: 0;
    z-index: 1000;
    background-color: rgba(var(--bg-background), 0.9);
    border-top: 1px solid var(--border-border);
    border-bottom: 1px solid var(--border-border);
    overflow: hidden;
  }

  .shadcn-header.menu-open .shadcn-mobile-menu {
    display: flex;
    flex-direction: column;
    animation: zoomIn 0.2s ease-out forwards;
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .shadcn-mobile-menu-inner {
    display: flex;
    height: 100%;
    width: 100%;
    flex-direction: column;
    justify-content: space-between;
    padding: 1rem;
    gap: 0.5rem;
  }

  .shadcn-mobile-links {
    display: grid;
    gap: 0.5rem;
  }

  .shadcn-mobile-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .w-full { width: 100%; }
  .justify-start { justify-content: flex-start; }

  .menu-toggle-icon {
    transition: transform 0.3s ease-in-out;
  }
  .shadcn-header.menu-open .menu-toggle-icon {
    transform: rotate(-45deg);
  }
  .menu-toggle-path-1 {
    transition: all 0.3s ease-in-out;
    stroke-dasharray: 12 63;
  }
  .shadcn-header.menu-open .menu-toggle-path-1 {
    stroke-dasharray: 20 300;
    stroke-dashoffset: -32.42px;
  }
</style>

<header class="shadcn-header" id="shadcnHeader">
  <nav class="shadcn-nav">
    <a href="index.html" style="display: flex; align-items: center; color: inherit; text-decoration: none;"><img src="simpliigood_wordmark.png" alt="SimpliiGood" class="shadcn-wordmark" style="height: 1.25rem; width: auto;" /></a>
    
    <div class="shadcn-desktop-menu">
      <a class="shadcn-btn shadcn-btn-ghost shadcn-btn-default-size" href="#">Features</a>
      <a class="shadcn-btn shadcn-btn-ghost shadcn-btn-default-size" href="pricing.html">Pricing</a>
      <a class="shadcn-btn shadcn-btn-ghost shadcn-btn-default-size" href="service.html">About</a>
      
      <a class="shadcn-btn shadcn-btn-primary shadcn-btn-default-size" href="#">Shop Now</a>
    </div>

    <button class="shadcn-btn shadcn-btn-outline shadcn-btn-icon-size shadcn-mobile-toggle" id="shadcnMenuToggle">
      <svg class="menu-toggle-icon" stroke-width="2.5" fill="none" stroke="currentColor" viewBox="0 0 32 32" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <path class="menu-toggle-path-1" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"></path>
        <path d="M7 16 27 16"></path>
      </svg>
    </button>
  </nav>

  <div class="shadcn-mobile-menu">
    <div class="shadcn-mobile-menu-inner">
      <div class="shadcn-mobile-links">
        <a class="shadcn-btn shadcn-btn-ghost shadcn-btn-default-size justify-start" href="#">Features</a>
        <a class="shadcn-btn shadcn-btn-ghost shadcn-btn-default-size justify-start" href="pricing.html">Pricing</a>
        <a class="shadcn-btn shadcn-btn-ghost shadcn-btn-default-size justify-start" href="service.html">About</a>
      </div>
      <div class="shadcn-mobile-buttons">
        
        <a class="shadcn-btn shadcn-btn-primary shadcn-btn-default-size w-full" href="#">Shop Now</a>
      </div>
    </div>
  </div>
</header>

<script>
  (function() {
    const header = document.getElementById('shadcnHeader');
    const toggleBtn = document.getElementById('shadcnMenuToggle');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 10) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });
    if (window.scrollY > 10) {
      header.classList.add('scrolled');
    }

    toggleBtn.addEventListener('click', () => {
      header.classList.toggle('menu-open');
      if (header.classList.contains('menu-open')) {
        document.body.classList.add('menu-open');
      } else {
        document.body.classList.remove('menu-open');
      }
    });
  })();
</script>
<!-- End Perfected Shadcn Navbar -->
